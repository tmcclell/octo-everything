name: User Story
description: A deliverable feature from the user's perspective
title: "[Story] "
labels: ["user-story"]
body:
  - type: markdown
    attributes:
      value: |
        ## User Story
        Write a clear user story following the format below.

  - type: textarea
    id: story
    attributes:
      label: User Story
      description: "As a [persona], I want [goal] so that [benefit]"
      placeholder: "As a dashboard user, I want to see PR cycle time trends so that I can identify bottlenecks."
    validations:
      required: true

  - type: textarea
    id: acceptance-criteria
    attributes:
      label: Acceptance Criteria
      description: List the specific conditions that must be met for this story to be considered done.
      placeholder: |
        - [ ] Chart displays daily median PR cycle time
        - [ ] Date range filter works correctly
        - [ ] Data refreshes on page load
    validations:
      required: true

  - type: dropdown
    id: area
    attributes:
      label: Area
      description: Which area of the project does this relate to?
      options:
        - SPACE
        - Copilot
        - Infrastructure
        - DevOps
    validations:
      required: true

  - type: dropdown
    id: priority
    attributes:
      label: Priority
      options:
        - P0-Critical
        - P1-High
        - P2-Medium
        - P3-Low
    validations:
      required: true

  - type: input
    id: story-points
    attributes:
      label: Story Points
      description: Estimated effort (1, 2, 3, 5, 8, 13)
      placeholder: "3"

  - type: textarea
    id: technical-notes
    attributes:
      label: Technical Notes
      description: Any implementation hints, API references, or design considerations.
