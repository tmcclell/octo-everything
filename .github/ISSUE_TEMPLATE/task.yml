name: Task
description: A technical work item or implementation task
title: "[Task] "
labels: ["task"]
body:
  - type: markdown
    attributes:
      value: |
        ## Task
        Describe the technical work to be done.

  - type: textarea
    id: description
    attributes:
      label: Description
      description: What needs to be done and why?
      placeholder: "Add pagination support to the SpaceCollector PR fetcher to handle repos with 1000+ PRs."
    validations:
      required: true

  - type: textarea
    id: definition-of-done
    attributes:
      label: Definition of Done
      description: Specific criteria for this task to be considered complete.
      placeholder: |
        - [ ] Pagination implemented with configurable page size
        - [ ] Unit tests cover pagination edge cases
        - [ ] No performance regression for small repos
    validations:
      required: true

  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - SPACE
        - Copilot
        - Infrastructure
        - DevOps
    validations:
      required: true

  - type: dropdown
    id: priority
    attributes:
      label: Priority
      options:
        - P0-Critical
        - P1-High
        - P2-Medium
        - P3-Low
    validations:
      required: true

  - type: input
    id: story-points
    attributes:
      label: Story Points
      description: Estimated effort (1, 2, 3, 5, 8, 13)
      placeholder: "2"

  - type: textarea
    id: technical-notes
    attributes:
      label: Technical Notes
      description: Implementation hints, API references, dependencies, or design notes.
